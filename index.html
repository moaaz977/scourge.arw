</head>
<body>
<nav>
  <a href="#" class="nav-logo">
    <img src="assets/logo.png" alt="scourge.arw">
  </a>
  <ul class="nav-links">
    <li><a href="#" class="active">Portfolio</a></li>
    <li><a href="https://instagram.com/scourge.arw" target="_blank" style="display:flex;align-items:center;gap:6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>Instagram</a></li>

<section class="hero">
  <p class="hero-label">scourge.arw · Inland Empire, CA</p>
  <h1>Light, <em>captured</em><br>in every frame.</h1>
  <p>A curated collection of automotive, nature, product, and portrait photography. Every shot is a story waiting to be told.</p>
</section>

<div class="cat-grid" id="cat-grid"></div>

<div class="photo-view" id="photo-view">
  <div class="photo-view-header">
    <button class="back-btn" id="back-btn">← Back</button>
    <span class="photo-view-title" id="photo-view-title"></span>
  </div>
  <div class="gallery" id="gallery"></div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-backdrop" id="lb-backdrop"></div>
  <button class="lb-arrow prev" id="lb-prev" aria-label="Previous">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="lb-arrow next" id="lb-next" aria-label="Next">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lb-close">✕ Close</button>
    <span class="lightbox-counter" id="lb-counter"></span>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lb-img" src="" alt="">
    </div>
  </div>
</div>
